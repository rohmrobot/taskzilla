<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskZilla System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .loader { border-top-color: #10b981; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="antialiased text-gray-800 flex justify-center items-center min-h-screen p-4">

  <div id="loading-page" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
    <div class="loader rounded-full border-4 border-gray-100 h-12 w-12 mb-4"></div>
    <p class="text-gray-500 font-medium animate-pulse" id="loading-text">กำลังโหลดระบบ...</p>
  </div>

  <div id="register-page" class="bg-white shadow-xl shadow-green-100/50 rounded-2xl w-full max-w-md p-8 hidden border border-gray-50">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 mb-4 overflow-hidden p-2">
        <img src="https://cdn-icons-png.flaticon.com/512/10436/10436052.png" alt="Logo" class="w-full h-full object-contain">
      </div>
      <h1 class="text-2xl font-bold text-gray-900">ลงทะเบียน TaskZilla</h1>
      <p class="text-sm text-gray-500 mt-1">กรุณากรอกข้อมูลเพื่อเริ่มต้นใช้งาน</p>
    </div>

    <div class="flex items-center space-x-4 bg-gray-50 p-4 rounded-xl mb-6">
      <img id="profile-img" src="" class="w-14 h-14 rounded-full border-2 border-white shadow-sm hidden object-cover">
      <div>
        <p class="text-sm text-gray-500">ลงทะเบียนในชื่อ</p>
        <p id="profile-name" class="font-semibold text-gray-800">-</p>
      </div>
    </div>

    <form id="register-form" class="space-y-4">
      <input type="hidden" id="userId">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสพนักงาน (Employee ID)</label>
        <input type="text" inputmode="numeric" id="empId" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all" placeholder="เช่น 001234">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">สิทธิ์การใช้งาน (Rule)</label>
        <select id="rule" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all">
          <option value="" disabled selected>-- เลือกตำแหน่งของคุณ --</option>
          <option value="Manager">ผู้จัดการ (Manager)</option>
          <option value="Supervisor">หัวหน้างาน (Supervisor)</option>
          <option value="Employee">พนักงานทั่วไป (Employee/Staff)</option>
        </select>
      </div>

      <div id="team-container" class="hidden">
        <label id="team-label" class="block text-sm font-medium text-gray-700 mb-1">ทีม (Team)</label>
        
        <input type="text" id="team-input" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all hidden" placeholder="ระบุชื่อทีมที่คุณดูแล">
        
        <select id="team-select" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all hidden">
        </select>
      </div>

      <button type="submit" id="btn-submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-xl shadow-lg shadow-green-200 transition-all duration-200 mt-4 flex justify-center items-center">
        ยืนยันการลงทะเบียน
      </button>
    </form>
  </div>

  <div id="error-page" class="hidden text-center">
    <h1 class="text-xl font-bold text-red-500">ไม่พบหน้าที่ต้องการ (404)</h1>
  </div>

  <script>
    const LIFF_ID = "2009855954-4FyocAL8";
    const SERVER_URL = "https://appointee-record-outsource.ngrok-free.dev/api/register";
    const LEADER_URL = SERVER_URL.replace('/register', '/leaders'); // API ดึงข้อมูลทีม

    let leadersData = { managers: [], supervisors: [] };

    // จัดการ Event เมื่อมีการเปลี่ยนตำแหน่ง (Rule)
    document.getElementById('rule').addEventListener('change', function() {
      const rule = this.value;
      const container = document.getElementById('team-container');
      const label = document.getElementById('team-label');
      const input = document.getElementById('team-input');
      const select = document.getElementById('team-select');

      container.classList.remove('hidden');
      input.classList.add('hidden');
      select.classList.add('hidden');
      input.removeAttribute('required');
      select.removeAttribute('required');

      if (rule === 'Manager') {
        label.textContent = 'ชื่อทีมของคุณ (ตั้งชื่อทีม)';
        input.classList.remove('hidden');
        input.required = true;
      } else if (rule === 'Supervisor') {
        label.textContent = 'เลือกสังกัดผู้จัดการ (Manager)';
        select.innerHTML = '<option value="" disabled selected>-- เลือก Manager ที่สังกัด --</option>';
        leadersData.managers.forEach(m => {
          select.innerHTML += `<option value="${m['Display Name']}">${m['Display Name']} (ทีม: ${m.Team})</option>`;
        });
        select.classList.remove('hidden');
        select.required = true;
      } else if (rule === 'Employee') {
        label.textContent = 'เลือกสังกัดซุปเปอร์ไวเซอร์ (Supervisor)';
        select.innerHTML = '<option value="" disabled selected>-- เลือก Supervisor ที่สังกัด --</option>';
        leadersData.supervisors.forEach(s => {
          select.innerHTML += `<option value="${s['Display Name']}">${s['Display Name']} (ทีม: ${s.Team})</option>`;
        });
        select.classList.remove('hidden');
        select.required = true;
      }
    });

    async function fetchLeaders() {
      try {
        const res = await fetch(LEADER_URL, { headers: { 'ngrok-skip-browser-warning': 'true' }});
        if (res.ok) {
          leadersData = await res.json();
        }
      } catch (e) { console.error("Failed to fetch leaders:", e); }
    }

    function router() {
      const urlParams = new URLSearchParams(window.location.search);
      const page = urlParams.get('page') || 'register'; 
      document.getElementById('register-page').classList.add('hidden');
      document.getElementById('error-page').classList.add('hidden');

      if (page === 'register') {
        document.getElementById('register-page').classList.remove('hidden');
      } else {
        document.getElementById('error-page').classList.remove('hidden');
      }
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        
        const profile = await liff.getProfile();
        document.getElementById('userId').value = profile.userId;
        document.getElementById('profile-name').textContent = profile.displayName;
        
        if (profile.pictureUrl) {
          const img = document.getElementById('profile-img');
          img.src = profile.pictureUrl;
          img.classList.remove('hidden');
        }

        await fetchLeaders(); // โหลดรายชื่อผู้จัดการและซุปเปอร์ไวเซอร์
        router(); 
        document.getElementById('loading-page').classList.add('hidden');

      } catch (err) {
        console.error("LIFF Error:", err);
        document.getElementById('loading-text').textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อ LINE";
        document.getElementById('loading-text').classList.replace('text-gray-500', 'text-red-500');
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = '<div class="loader rounded-full border-2 border-white h-5 w-5 mr-2"></div> บันทึกข้อมูล...';

      const rule = document.getElementById('rule').value;
      // ดึงค่า Team จาก Input หรือ Select ให้ตรงกับ Rule
      const teamValue = rule === 'Manager' ? document.getElementById('team-input').value : document.getElementById('team-select').value;

      const data = {
        userId: document.getElementById('userId').value,
        empId: document.getElementById('empId').value,
        rule: rule,
        team: teamValue,
        displayName: document.getElementById('profile-name').textContent
      };

      try {
        const response = await fetch(SERVER_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'text/plain',
            'ngrok-skip-browser-warning': 'true' 
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          liff.closeWindow();
        } else {
          throw new Error("Server Error");
        }
      } catch (error) {
        console.error(error);
        alert("ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง");
        btn.disabled = false;
        btn.innerHTML = 'ยืนยันการลงทะเบียน';
      }
    });

    main();
  </script>
</body>
</html>
